name: Deploy to GitHub Pages
on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 * * * *' # 매시간 정각 자동 실행

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run Crawler
        run: node ./scripts/crawler.mjs

      - name: Build Astro
        run: npm run build

      - name: Setup Pages
        uses: astrojs/official-action@v0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4